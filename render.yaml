services:
  # Web Service (Flask App)
  - type: web
    name: online-shopping-system
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn run:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_CONFIG
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopping-db
          property: connectionString

databases:
  # PostgreSQL Database
  - name: shopping-db
    databaseName: shopping_system
    user: shopping_user
