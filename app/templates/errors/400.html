{% extends "base.html" %}

{% block title %}400 - Bad Request{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <h1 class="display-1">400</h1>
        <h2 class="mb-4">Bad Request</h2>
        <p class="lead">The request could not be understood or was missing required parameters.</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Go to Home</a>
    </div>
</div>
{% endblock %}
