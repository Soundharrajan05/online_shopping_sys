{% extends "base.html" %}

{% block title %}Edit Product - Online Shopping System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">Edit Product</h1>
        
        <div class="mb-3">
            <a href="{{ url_for('admin.manage_products') }}" class="btn btn-secondary">
                &larr; Back to Products
            </a>
        </div>
    </div>
</div>

<!-- Edit Product Form -->
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0">Edit Product Information</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin.update_product', product_id=product.product_id) }}">
                    <div class="mb-3">
                        <label for="product_name" class="form-label">Product Name <span class="text-danger">*</span></label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="product_name" 
                            name="product_name" 
                            required 
                            maxlength="200"
                            value="{{ product.product_name }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea 
                            class="form-control" 
                            id="description" 
                            name="description" 
                            rows="4">{{ product.description or '' }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label">Price <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="price" 
                                    name="price" 
                                    required 
                                    min="0" 
                                    step="0.01"
                                    value="{{ product.price }}">
                            </div>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="stock_quantity" class="form-label">Stock Quantity <span class="text-danger">*</span></label>
                            <input 
                                type="number" 
                                class="form-control" 
                                id="stock_quantity" 
                                name="stock_quantity" 
                                required 
                                min="0"
                                value="{{ product.stock_quantity }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="category_id" class="form-label">Category</label>
                        <select class="form-select" id="category_id" name="category_id">
                            <option value="">-- Select Category --</option>
                            {% for category in categories %}
                            <option value="{{ category.category_id }}" 
                                    {% if category.category_id == product.category_id %}selected{% endif %}>
                                {{ category.category_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="image_url" class="form-label">Image URL</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="image_url" 
                            name="image_url" 
                            maxlength="255"
                            value="{{ product.image_url or '' }}">
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">Update Product</button>
                        <a href="{{ url_for('admin.manage_products') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
